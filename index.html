<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Coppatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOTHES</title>	
    <link href="https://fonts.googleapis.com/css?family=Caveat" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./responsive.css">
</head>
<body>
    <!-- ヘッダー -->
    <header class="header"> 
        <div class="header-container">
            <div class="header-left">
                <a href="#" class="logo">CLOTHES</a>
            </div>
            <div class="header-right">
                    <!-- トグル -->
                    <div class="toggle_btn">
                        <span class="toggle_btn_bd"></span>
                        <span class="toggle_btn_bd"></span>
                        <span class="toggle_btn_bd"></span>
                    </div>
            </div>
        </div>
    </header>
    <main>
        <!-- トップ画面 -->
        <section class="hero">
            <video src="./image/movie-clothes.mov" playsinline="playsinline" autoplay muted loop class="hero-movie"></video>
            <video src="./image/movie-clothes-sp.mov" playsinline="playsinline" autoplay muted loop class="hero-movie-sp"></video>
        </section>
        <!-- ファッション -->
        <section class="person">
            <div class="person-container">
                <h2 class="person-head">Fashion</h2>
                <div class="person-inner">
                    <img src="./image/person1.jpg" class="person-inner-pic">
                    <img src="./image/person2.jpg" class="person-inner-pic">
                    <img src="./image/person3.jpg" class="person-inner-pic">
                </div>
            </div>
        </section>
        <!-- 服 -->
        <section class="clothes">
            <div class="clothes-container">
                <h2 class="clothes-head">Clothes</h2>
                <div class="clothes-inner">
                    <img src="./image/clothes1.jpg" class="clothes-inner-pic pic1">
                    <img src="./image/clothes2.jpg" class="clothes-inner-pic pic2">
                    <img src="./image/clothes3.jpg" class="clothes-inner-pic pic3">
                    <img src="./image/clothes4.jpg" class="clothes-inner-pic pic4">
                    <img src="./image/clothes5.jpg" class="clothes-inner-pic pic5">
                </div>
            </div>
        </section>
        <!-- 擬似要素 -->
        <section class="content">
            <div class="content-container">
                <h2 class="content-head">Goods</h2>
                    <div class="content-inner">
                        <div class="content-inner-item">
                            <figure class="content-inner-pic-cover">
                                <img src="./image/bag.jpg" class="content-inner-pic">
                            </figure>
                            <div class="content-inner-item-bottom">
                                <h3 class="content-inner-item-head">
                                    bag
                                </h3>
                                <p class="content-inner-item-content">
                                    TextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextTextText
                                </p>
                            </div>
                        </div>
                    </div>
            </div>
        </section>
    </main>
    <!-- フッター -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-inner">
                <div class="footer-inner-left">
                    <a href="#" class="logo">CLOTHS</a>
                </div>
                <div class="footer-inner-right">
                    <ul class="footer-lists">
                        <li class="footer-list"><a href="#" class="footer-list-btn">Text</a></li>
                        <li class="footer-list"><a href="#" class="footer-list-btn">Text</a></li>
                        <li class="footer-list"><a href="#" class="footer-list-btn">Text</a></li>
                        <li class="footer-list"><a href="#" class="footer-list-btn">Text</a></li>
                        <li class="footer-list"><a href="#" class="footer-list-btn">Text</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="copywrite-inner">
            <span class="copywrite">
                &copy;Clothes. All Rights Reserved.
            </span>
        </div>
    </footer>
</body>
</html>
